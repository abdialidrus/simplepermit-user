name: simple_permit_user
description: SimplePermit - User app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  app_themes:
    path: packages/app_themes
  bloc: ^8.1.4
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.13
  google_fonts: ^6.2.1
  intl: ^0.19.0
  local_storage_permit_api:
    path: packages/local_storage_permit_api
  permit_api:
    path: packages/permit_api
  permit_repository:
    path: packages/permit_repository

dev_dependencies:
  bloc_test: ^9.1.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
